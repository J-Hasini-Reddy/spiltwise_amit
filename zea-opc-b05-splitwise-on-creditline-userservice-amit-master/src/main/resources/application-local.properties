# ==========================================
# LOCAL PROFILE CONFIGURATION
# Run User Service on port 8082 for local development
# ==========================================

# Server port - User Service runs on 8082 locally
server.port=8082

# PostgreSQL Database for local development
spring.datasource.url=jdbc:postgresql://localhost:5432/users
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=amit4865
spring.datasource.max-total=10

# Flyway configuration (disabled for local - use setup_local_db.sql instead)
spring.flyway.enabled=false

# Disable JPA auto-configuration
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# Logging
logging.level.org.springframework.web=DEBUG
logging.level.root=INFO
logging.level.com.example.userservice=DEBUG
logging.level.in.zeta=DEBUG
logging.level.olympus=DEBUG
